<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Swim Coach Annotator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0c;color:#b0c0d0;font-family:'IBM Plex Mono','Menlo',monospace;min-height:100vh;-webkit-text-size-adjust:100%;overflow-x:hidden;touch-action:manipulation}
.wrap{max-width:1000px;margin:0 auto;padding:12px 12px 80px}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

.header{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06)}

/* Upload */
#upload-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;height:360px;border-radius:12px;cursor:pointer;border:1px dashed rgba(0,229,255,.2);background:rgba(0,229,255,.015)}

#player-area{display:none}

/* Video + Canvas container */
.canvas-wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#000;margin-bottom:6px;touch-action:none}
.canvas-wrap video{width:100%;display:block;max-height:520px;object-fit:contain;background:#000}
#draw-canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;touch-action:none}
.canvas-wrap.drawing #draw-canvas{z-index:10}
.canvas-wrap:not(.drawing) #draw-canvas{pointer-events:none;z-index:1}

/* Mode indicator */
#mode-badge{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:20;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;pointer-events:none;transition:.2s}
.mode-play{background:rgba(0,229,255,.15);color:#00e5ff;border:1px solid rgba(0,229,255,.3)}
.mode-draw{background:rgba(255,215,64,.15);color:#ffd740;border:1px solid rgba(255,215,64,.3)}
.mode-erase{background:rgba(255,82,82,.15);color:#ff5252;border:1px solid rgba(255,82,82,.3)}

/* HUD */
.hud{position:absolute;bottom:8px;left:10px;z-index:5;pointer-events:none}
.hud-box{background:rgba(0,0,0,.8);border-radius:6px;padding:5px 10px;backdrop-filter:blur(8px)}
#hud-time{font-size:16px;font-weight:800;color:#00e5ff;font-variant-numeric:tabular-nums}
#hud-frame{font-size:10px;color:#3a4a5a}
#hud-frame b{color:#ffd740}

/* Tap to play */
#tap-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.5);cursor:pointer;z-index:15;border-radius:10px}
#tap-overlay.hidden{display:none}
.play-circle{width:70px;height:70px;border-radius:50%;background:rgba(0,229,255,.2);border:3px solid #00e5ff;display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:8px}

#status-bar{padding:8px 12px;border-radius:6px;margin-bottom:8px;font-size:11px;display:none}
#status-bar.loading{display:block;background:rgba(255,215,64,.08);border:1px solid rgba(255,215,64,.12);color:#ffd740}
#status-bar.error{display:block;background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.12);color:#ff5252}
#status-bar.ready{display:block;background:rgba(118,255,3,.06);border:1px solid rgba(118,255,3,.1);color:#76ff03}

/* Transport */
.transport{display:grid;grid-template-columns:1fr 1fr 1.5fr 1fr 1fr;gap:5px;margin-bottom:8px}
.btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 10px;color:#7a8a9a;font-size:13px;font-weight:600;min-height:48px;display:flex;align-items:center;justify-content:center;gap:4px;transition:.12s;white-space:nowrap}
.btn:active{background:rgba(255,255,255,.08)}
.btn-play{background:linear-gradient(135deg,#00e5ff,#0077b6);color:#0a0a0c;font-weight:800;border:none}
.btn-pause{background:rgba(255,82,82,.12);border:1px solid rgba(255,82,82,.3);color:#ff5252;font-weight:800}

/* Speed row */
.speed-row{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.btn-sm{padding:8px 10px;min-height:38px;font-size:12px;border-radius:8px;flex:0 0 auto}
.btn-on{background:rgba(255,215,64,.12)!important;border-color:#ffd740!important;color:#ffd740!important}

/* Drawing toolbar */
.draw-bar{background:rgba(255,255,255,.025);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,.05);margin-bottom:8px}
.draw-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.draw-label{font-size:9px;color:#3a4a5a;letter-spacing:1.5px;text-transform:uppercase;margin-right:2px}

/* Color swatches */
.swatch{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:.12s}
.swatch.on{border-color:#fff;transform:scale(1.15);box-shadow:0 0 12px rgba(255,255,255,.2)}

/* Tool buttons */
.tool-btn{padding:8px 14px;min-height:40px;border-radius:8px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px}
.tool-btn.active{box-shadow:0 0 12px rgba(255,255,255,.1)}

/* Width slider */
.width-slider{-webkit-appearance:none;appearance:none;width:100px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;outline:none}
.width-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #333;cursor:pointer}

/* Save button */
.save-btn{background:linear-gradient(135deg,#76ff03,#00c853);color:#0a0a0c;border:none;border-radius:10px;padding:12px 20px;font-weight:800;font-size:13px;font-family:inherit;cursor:pointer;min-height:44px}

.divider{width:1px;height:28px;background:rgba(255,255,255,.08);margin:0 4px;flex-shrink:0}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:11px;color:#00e5ff;font-weight:700;letter-spacing:2px">🏊 SWIM COACH</span>
      <span id="file-label" style="font-size:11px;color:#3a4a5a"></span>
    </div>
    <span id="fps-badge" style="font-size:10px;color:#76ff03;padding:3px 8px;background:rgba(118,255,3,.08);border-radius:4px;display:none"></span>
  </div>

  <!-- Upload -->
  <label id="upload-zone">
    <input type="file" accept="video/*" id="file-input" style="display:none">
    <div style="font-size:48px;margin-bottom:10px;opacity:.4">🎬</div>
    <div style="font-size:16px;color:#00e5ff;font-weight:600">Load Swim Video</div>
    <div style="font-size:12px;color:#3a4a5a;margin-top:6px">Select from Photo Library or Files</div>
  </label>

  <!-- Player -->
  <div id="player-area">
    <div id="status-bar"></div>

    <!-- Video + Drawing Canvas -->
    <div class="canvas-wrap" id="canvas-wrap">
      <video id="vid" playsinline webkit-playsinline preload="auto" muted></video>
      <canvas id="draw-canvas"></canvas>
      <div id="mode-badge" class="mode-play">▶ PLAY MODE</div>
      <div class="hud">
        <div class="hud-box">
          <div id="hud-time">--:--.--</div>
          <div id="hud-frame">Frame <b>--</b></div>
        </div>
      </div>
      <div id="tap-overlay" onclick="tapPlay()">
        <div class="play-circle">▶</div>
        <div style="font-size:14px;color:#00e5ff;font-weight:700">TAP TO START</div>
      </div>
    </div>

    <!-- Transport -->
    <div class="transport">
      <button class="btn" onclick="step(-1)">◀ Frame</button>
      <button class="btn" onclick="nudge(-0.5)">-0.5s</button>
      <button class="btn btn-play" id="play-btn" onclick="toggle()">▶ PLAY</button>
      <button class="btn" onclick="nudge(0.5)">+0.5s</button>
      <button class="btn" onclick="step(1)">Frame ▶</button>
    </div>

    <!-- Speed -->
    <div class="speed-row">
      <span style="font-size:9px;color:#3a4a5a;letter-spacing:1.5px;padding:10px 4px;flex-shrink:0">SPEED</span>
      <button class="btn btn-sm" id="spd-005" onclick="setSpd(0.05)">0.05x</button>
      <button class="btn btn-sm" id="spd-01" onclick="setSpd(0.1)">0.1x</button>
      <button class="btn btn-sm" id="spd-025" onclick="setSpd(0.25)">0.25x</button>
      <button class="btn btn-sm" id="spd-05" onclick="setSpd(0.5)">0.5x</button>
      <button class="btn btn-sm btn-on" id="spd-1" onclick="setSpd(1)">1x</button>
      <button class="btn btn-sm" id="spd-2" onclick="setSpd(2)">2x</button>
    </div>

    <!-- Drawing Toolbar -->
    <div class="draw-bar">
      <div class="draw-row" style="margin-bottom:10px">
        <span class="draw-label">TOOL</span>
        <button class="btn tool-btn" id="tool-draw" onclick="setTool('draw')" style="background:rgba(255,215,64,.12);border:1px solid #ffd740;color:#ffd740">✏️ Draw</button>
        <button class="btn tool-btn" id="tool-erase" onclick="setTool('erase')" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#7a8a9a">🧹 Erase</button>
        <div class="divider"></div>
        <button class="btn tool-btn" onclick="undoDraw()" style="color:#80d8ff">↩ Undo</button>
        <button class="btn tool-btn" onclick="clearDraw()" style="color:#ff5252">🗑 Clear</button>
        <div class="divider"></div>
        <button class="save-btn" onclick="saveFrame()">📸 Save Frame</button>
      </div>

      <div class="draw-row">
        <span class="draw-label">COLOR</span>
        <div class="swatch on" id="sw-#ff3333" onclick="setColor('#ff3333')" style="background:#ff3333"></div>
        <div class="swatch" id="sw-#ffd740" onclick="setColor('#ffd740')" style="background:#ffd740"></div>
        <div class="swatch" id="sw-#76ff03" onclick="setColor('#76ff03')" style="background:#76ff03"></div>
        <div class="swatch" id="sw-#00e5ff" onclick="setColor('#00e5ff')" style="background:#00e5ff"></div>
        <div class="swatch" id="sw-#e040fb" onclick="setColor('#e040fb')" style="background:#e040fb"></div>
        <div class="swatch" id="sw-#ffffff" onclick="setColor('#ffffff')" style="background:#ffffff"></div>
        <div class="divider"></div>
        <span class="draw-label">SIZE</span>
        <input type="range" class="width-slider" id="width-slider" min="2" max="20" value="4" oninput="lineWidth=parseInt(this.value)">
        <span id="width-val" style="font-size:11px;color:#5a7a8a;min-width:24px">4px</span>
      </div>
    </div>

    <!-- Tip -->
    <div style="padding:10px 14px;border-radius:8px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.03);font-size:11px;color:#2a3a4a;line-height:1.7">
      <strong style="color:#3a4a5a">How to use:</strong> Pause on a frame → pick a color → draw with your finger to annotate form. Use <strong style="color:#ff5252">red</strong> for corrections, <strong style="color:#76ff03">green</strong> for good form. Tap <strong style="color:#80d8ff">Save Frame</strong> to export an annotated screenshot.
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let fps = 30, rate = 1, playing = false, videoReady = false;
let tool = 'draw', drawColor = '#ff3333', lineWidth = 4;
let isDrawing = false;
let strokes = []; // Array of stroke arrays for undo
let currentStroke = [];

const V = document.getElementById('vid');
const CW = document.getElementById('canvas-wrap');
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const modeBadge = document.getElementById('mode-badge');

function fmT(s) { if(isNaN(s)) return'--:--.--'; return Math.floor(s/60)+':'+(s%60).toFixed(2).padStart(5,'0'); }
function fn(s) { return Math.round(s * fps); }

function showStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = type;
}

// ===== MODE MANAGEMENT =====
function updateMode() {
  if (playing) {
    CW.classList.remove('drawing');
    modeBadge.className = 'mode-play';
    modeBadge.textContent = '▶ PLAY MODE';
  } else if (tool === 'erase') {
    CW.classList.add('drawing');
    modeBadge.className = 'mode-erase';
    modeBadge.textContent = '🧹 ERASE MODE';
  } else {
    CW.classList.add('drawing');
    modeBadge.className = 'mode-draw';
    modeBadge.textContent = '✏️ DRAW MODE — use your finger';
  }
}

// ===== FILE LOADING =====
document.getElementById('file-input').addEventListener('change', function(e) {
  const f = e.target.files[0];
  if (!f) return;
  showStatus('Loading ' + f.name + '...', 'loading');
  document.getElementById('file-label').textContent = '· ' + f.name;
  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('player-area').style.display = 'block';
  V.src = URL.createObjectURL(f);
  V.load();
  videoReady = false;
  strokes = []; currentStroke = [];
});

// ===== VIDEO EVENTS =====
V.addEventListener('loadedmetadata', function() {
  showStatus('Loaded: ' + V.videoWidth + '×' + V.videoHeight + ' · ' + V.duration.toFixed(1) + 's', 'loading');
  resizeCanvas();
});

V.addEventListener('loadeddata', function() {
  showStatus('Ready — tap to play, then pause to draw', 'ready');
  videoReady = true;
  document.getElementById('tap-overlay').style.display = 'flex';
  updateHUD();
});

V.addEventListener('canplay', function() {
  showStatus('Ready — tap to play, then pause on a frame to annotate', 'ready');
  videoReady = true;
  resizeCanvas();
});

V.addEventListener('error', function() {
  const err = V.error;
  let msg = 'Error: ';
  if (err) {
    switch(err.code) {
      case 1: msg += 'Aborted'; break;
      case 2: msg += 'Network error'; break;
      case 3: msg += 'Decoding error — format not supported'; break;
      case 4: msg += 'Format not supported'; break;
      default: msg += 'Unknown';
    }
  }
  showStatus(msg, 'error');
});

V.addEventListener('play', function() {
  playing = true;
  document.getElementById('tap-overlay').classList.add('hidden');
  document.getElementById('play-btn').className = 'btn btn-pause';
  document.getElementById('play-btn').innerHTML = '⏸ PAUSE';
  updateMode();
  if (V.requestVideoFrameCallback) V.requestVideoFrameCallback(onVF);
});

V.addEventListener('pause', function() {
  playing = false;
  document.getElementById('play-btn').className = 'btn btn-play';
  document.getElementById('play-btn').innerHTML = '▶ PLAY';
  updateMode();
});

V.addEventListener('ended', function() {
  playing = false;
  document.getElementById('play-btn').className = 'btn btn-play';
  document.getElementById('play-btn').innerHTML = '▶ PLAY';
  updateMode();
});

function tapPlay() {
  V.play().then(function() {
    document.getElementById('tap-overlay').classList.add('hidden');
  }).catch(function(err) {
    showStatus('Tap Play button below: ' + err.message, 'error');
  });
}

// ===== CANVAS SIZING =====
function resizeCanvas() {
  // Match canvas to actual displayed video size
  const rect = V.getBoundingClientRect();
  canvas.width = rect.width * (window.devicePixelRatio || 1);
  canvas.height = rect.height * (window.devicePixelRatio || 1);
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  redrawAll();
}

window.addEventListener('resize', function() { if (V.src) resizeCanvas(); });

// ===== FPS DETECTION =====
let fpsSamples = [];
function onVF(now, meta) {
  updateHUD();
  fpsSamples.push(meta.mediaTime);
  if (fpsSamples.length > 20) {
    const d = [];
    for (let i=1; i<fpsSamples.length; i++) {
      const x = fpsSamples[i] - fpsSamples[i-1];
      if (x > .001 && x < .2) d.push(x);
    }
    if (d.length > 10) {
      const avg = d.reduce((a,b)=>a+b,0)/d.length;
      const det = Math.round(1/avg);
      if (det > 10 && det < 240) {
        fps = det;
        const b = document.getElementById('fps-badge');
        b.textContent = det + 'fps';
        b.style.display = 'inline';
      }
    }
    fpsSamples = fpsSamples.slice(-10);
  }
  if (!V.paused && V.requestVideoFrameCallback) V.requestVideoFrameCallback(onVF);
}

// Fallback poll
setInterval(function() { if (V.src && V.readyState > 0) updateHUD(); }, 80);

function updateHUD() {
  document.getElementById('hud-time').textContent = fmT(V.currentTime);
  document.getElementById('hud-frame').innerHTML = 'Frame <b>' + fn(V.currentTime) + '</b>';
}

// ===== PLAYBACK CONTROLS =====
function toggle() { playing ? V.pause() : V.play(); }
function step(n) { V.pause(); V.currentTime = Math.max(0, Math.min(V.duration, V.currentTime + n/fps)); updateHUD(); }
function nudge(s) { V.currentTime = Math.max(0, Math.min(V.duration, V.currentTime + s)); updateHUD(); }

function setSpd(r) {
  rate = r; V.playbackRate = r;
  [0.05,0.1,0.25,0.5,1,2].forEach(function(s) {
    const el = document.getElementById('spd-' + String(s).replace('.',''));
    if (el) el.className = 'btn btn-sm' + (Math.abs(rate-s)<.01 ? ' btn-on' : '');
  });
}

// ===== DRAWING TOOLS =====
function setTool(t) {
  tool = t;
  document.getElementById('tool-draw').style.background = t==='draw' ? 'rgba(255,215,64,.12)' : 'rgba(255,255,255,.04)';
  document.getElementById('tool-draw').style.borderColor = t==='draw' ? '#ffd740' : 'rgba(255,255,255,.08)';
  document.getElementById('tool-draw').style.color = t==='draw' ? '#ffd740' : '#7a8a9a';
  document.getElementById('tool-erase').style.background = t==='erase' ? 'rgba(255,82,82,.12)' : 'rgba(255,255,255,.04)';
  document.getElementById('tool-erase').style.borderColor = t==='erase' ? '#ff5252' : 'rgba(255,255,255,.08)';
  document.getElementById('tool-erase').style.color = t==='erase' ? '#ff5252' : '#7a8a9a';
  updateMode();
}

function setColor(c) {
  drawColor = c;
  document.querySelectorAll('.swatch').forEach(function(el) {
    el.classList.toggle('on', el.id === 'sw-' + c);
  });
  if (tool === 'erase') setTool('draw');
}

document.getElementById('width-slider').addEventListener('input', function() {
  lineWidth = parseInt(this.value);
  document.getElementById('width-val').textContent = lineWidth + 'px';
});

// ===== DRAWING ON CANVAS =====
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  let x, y;
  if (e.touches) {
    x = e.touches[0].clientX - rect.left;
    y = e.touches[0].clientY - rect.top;
  } else {
    x = e.clientX - rect.left;
    y = e.clientY - rect.top;
  }
  return { x: x, y: y };
}

function startDraw(e) {
  if (playing) return; // Only draw when paused
  e.preventDefault();
  isDrawing = true;
  const pos = getPos(e);
  currentStroke = [{
    x: pos.x, y: pos.y,
    color: tool === 'erase' ? 'erase' : drawColor,
    width: tool === 'erase' ? lineWidth * 4 : lineWidth,
    tool: tool,
  }];
}

function moveDraw(e) {
  if (!isDrawing || playing) return;
  e.preventDefault();
  const pos = getPos(e);
  const prev = currentStroke[currentStroke.length - 1];

  if (tool === 'erase') {
    // Erase mode: draw with destination-out
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth = lineWidth * 4;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = drawColor;
    ctx.lineWidth = lineWidth;
  }

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(prev.x, prev.y);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();

  currentStroke.push({
    x: pos.x, y: pos.y,
    color: tool === 'erase' ? 'erase' : drawColor,
    width: tool === 'erase' ? lineWidth * 4 : lineWidth,
    tool: tool,
  });

  ctx.globalCompositeOperation = 'source-over';
}

function endDraw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  isDrawing = false;
  if (currentStroke.length > 1) {
    strokes.push(currentStroke.slice());
  }
  currentStroke = [];
}

// Touch events
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', moveDraw, { passive: false });
canvas.addEventListener('touchend', endDraw, { passive: false });
canvas.addEventListener('touchcancel', endDraw, { passive: false });

// Mouse events (Mac)
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);

// ===== UNDO / CLEAR / REDRAW =====
function redrawAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  strokes.forEach(function(stroke) {
    if (stroke.length < 2) return;
    for (let i = 1; i < stroke.length; i++) {
      const prev = stroke[i-1], pt = stroke[i];
      if (pt.tool === 'erase') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.strokeStyle = 'rgba(0,0,0,1)';
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = pt.color;
      }
      ctx.lineWidth = pt.width;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(prev.x, prev.y);
      ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
    }
  });
  ctx.globalCompositeOperation = 'source-over';
}

function undoDraw() {
  if (strokes.length === 0) return;
  strokes.pop();
  resizeCanvas(); // Also redraws
}

function clearDraw() {
  strokes = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ===== SAVE ANNOTATED FRAME =====
function saveFrame() {
  const rect = V.getBoundingClientRect();
  const saveCanvas = document.createElement('canvas');
  saveCanvas.width = V.videoWidth;
  saveCanvas.height = V.videoHeight;
  const sctx = saveCanvas.getContext('2d');

  // Draw video frame
  sctx.drawImage(V, 0, 0, V.videoWidth, V.videoHeight);

  // Scale and draw annotations
  const scaleX = V.videoWidth / rect.width;
  const scaleY = V.videoHeight / rect.height;

  strokes.forEach(function(stroke) {
    if (stroke.length < 2) return;
    for (let i = 1; i < stroke.length; i++) {
      const prev = stroke[i-1], pt = stroke[i];
      if (pt.tool === 'erase') continue; // Skip erased parts in export
      sctx.globalCompositeOperation = 'source-over';
      sctx.strokeStyle = pt.color;
      sctx.lineWidth = pt.width * scaleX;
      sctx.lineCap = 'round';
      sctx.lineJoin = 'round';
      sctx.beginPath();
      sctx.moveTo(prev.x * scaleX, prev.y * scaleY);
      sctx.lineTo(pt.x * scaleX, pt.y * scaleY);
      sctx.stroke();
    }
  });

  // Add timestamp watermark
  sctx.font = 'bold ' + Math.round(V.videoHeight * 0.03) + 'px IBM Plex Mono, monospace';
  sctx.fillStyle = 'rgba(0,229,255,0.8)';
  sctx.fillText(fmT(V.currentTime) + '  F' + fn(V.currentTime), 20, V.videoHeight - 20);

  // Download
  const link = document.createElement('a');
  link.download = 'swim-frame-' + fn(V.currentTime) + '.png';
  link.href = saveCanvas.toDataURL('image/png');
  link.click();
}

// ===== KEYBOARD (Mac) =====
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case ' ': e.preventDefault(); toggle(); break;
    case 'ArrowRight': e.preventDefault(); step(e.shiftKey ? 10 : 1); break;
    case 'ArrowLeft': e.preventDefault(); step(e.shiftKey ? -10 : -1); break;
    case 'ArrowUp': e.preventDefault(); setSpd(Math.min(4, rate * 1.25)); break;
    case 'ArrowDown': e.preventDefault(); setSpd(Math.max(.05, rate / 1.25)); break;
    case 'd': case 'D': setTool('draw'); break;
    case 'e': case 'E': setTool('erase'); break;
    case 'z': case 'Z': if(e.metaKey||e.ctrlKey) undoDraw(); break;
    case 'c': case 'C': if(!e.metaKey&&!e.ctrlKey) clearDraw(); break;
  }
});
</script>
