<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Swim Coach Annotator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0c;color:#b0c0d0;font-family:'IBM Plex Mono','Menlo',monospace;min-height:100vh;-webkit-text-size-adjust:100%;overflow-x:hidden;touch-action:manipulation}
.wrap{max-width:1000px;margin:0 auto;padding:12px 12px 80px}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

#upload-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;height:360px;border-radius:12px;cursor:pointer;border:1px dashed rgba(0,229,255,.2);background:rgba(0,229,255,.015)}
#upload-zone:hover{border-color:rgba(0,229,255,.4)}
#player-area{display:none}

/* Video */
.canvas-wrap{position:relative;border-radius:10px 10px 0 0;overflow:hidden;border:1px solid rgba(255,255,255,.08);border-bottom:none;background:#000;touch-action:none}
.canvas-wrap video{width:100%;display:block;max-height:480px;object-fit:contain;background:#000}
#draw-canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none}
.canvas-wrap.drawing #draw-canvas{z-index:10;cursor:crosshair}
.canvas-wrap:not(.drawing) #draw-canvas{pointer-events:none;z-index:1}

/* Info bar */
.info-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:rgba(255,255,255,.025);border-left:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08);font-size:12px}
.time-display{font-size:18px;font-weight:800;color:#00e5ff;font-variant-numeric:tabular-nums}
.frame-display{font-size:12px;color:#5a7a8a;margin-left:10px}
.frame-display b{color:#ffd740}
.mode-display{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:12px}
.mode-play{background:rgba(0,229,255,.1);color:#00e5ff}
.mode-draw{background:rgba(255,215,64,.1);color:#ffd740}
.mode-erase{background:rgba(255,82,82,.1);color:#ff5252}

/* Motion graph — directly connected to video */
.graph-box{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-top:none;border-radius:0 0 10px 10px;padding:0;margin-bottom:8px;position:relative;overflow:hidden}
.graph-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px 4px}
.graph-title{font-size:9px;color:#3a4a5a;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.graph-controls{display:flex;gap:6px;align-items:center}
.scan-btn{background:linear-gradient(135deg,#00e5ff,#0077b6);color:#0a0a0c;border:none;border-radius:6px;padding:5px 14px;font-weight:700;font-size:11px;font-family:inherit}
.scan-btn:disabled{opacity:.4;cursor:not-allowed}
.scan-btn.scanning{background:linear-gradient(135deg,#ffd740,#ff9100);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
#graph-canvas{width:100%;height:120px;display:block;cursor:pointer}
.graph-info{display:flex;justify-content:space-between;padding:4px 12px 6px;font-size:9px;color:#3a4a5a}
#scan-progress{height:3px;background:rgba(0,229,255,.3);width:0%;transition:width .1s;border-radius:2px}

#status-bar{padding:6px 12px;border-radius:6px;font-size:11px;display:none;margin-bottom:6px}
#status-bar.loading{display:block;background:rgba(255,215,64,.06);color:#ffd740}
#status-bar.error{display:block;background:rgba(255,82,82,.06);color:#ff5252}
#status-bar.ready{display:block;background:rgba(118,255,3,.04);color:#76ff03}

/* Buttons */
.btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;color:#7a8a9a;font-size:13px;font-weight:600;min-height:48px;display:flex;align-items:center;justify-content:center;gap:4px;transition:.12s;white-space:nowrap}
.btn:active{background:rgba(255,255,255,.08)}
.btn-play{background:linear-gradient(135deg,#00e5ff,#0077b6);color:#0a0a0c;font-weight:800;border:none}
.btn-pause{background:rgba(255,82,82,.12);border:1px solid rgba(255,82,82,.3);color:#ff5252;font-weight:800}
.btn-sm{padding:8px 10px;min-height:38px;font-size:12px;border-radius:8px}
.btn-on{background:rgba(255,215,64,.12)!important;border-color:#ffd740!important;color:#ffd740!important}

.frame-row{display:grid;grid-template-columns:1fr 1fr 1.5fr 1fr 1fr;gap:5px;margin-bottom:6px}
.frame10-row{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:5px;margin-bottom:8px}
.speed-row{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;align-items:center}
.speed-label{font-size:9px;color:#3a4a5a;letter-spacing:1.5px;flex-shrink:0;padding-right:4px}

/* Drawing toolbar */
.draw-bar{background:rgba(255,255,255,.025);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,.05);margin-bottom:8px}
.draw-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.draw-label{font-size:9px;color:#3a4a5a;letter-spacing:1.5px;text-transform:uppercase;margin-right:2px;flex-shrink:0}
.swatch{width:40px;height:40px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:.12s;flex-shrink:0}
.swatch.on{border-color:rgba(255,255,255,.6);transform:scale(1.15)}
.tool-btn{padding:10px 16px;min-height:44px;border-radius:8px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.width-slider{-webkit-appearance:none;appearance:none;width:100px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;outline:none;flex-shrink:0}
.width-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid #333;cursor:pointer}
.save-btn{background:linear-gradient(135deg,#76ff03,#00c853);color:#0a0a0c;border:none;border-radius:10px;padding:12px 20px;font-weight:800;font-size:13px;font-family:inherit;cursor:pointer;min-height:48px;flex-shrink:0}
.divider{width:1px;height:28px;background:rgba(255,255,255,.08);margin:0 4px;flex-shrink:0}
.tip{padding:10px 14px;border-radius:8px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.03);font-size:11px;color:#2a3a4a;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">

  <label id="upload-zone">
    <input type="file" accept="video/*" id="file-input" style="display:none">
    <div style="font-size:48px;margin-bottom:10px;opacity:.4">🏊</div>
    <div style="font-size:16px;color:#00e5ff;font-weight:600">Load Swim Video</div>
    <div style="font-size:12px;color:#3a4a5a;margin-top:6px">Select from Photo Library or Files</div>
  </label>

  <div id="player-area">
    <div id="status-bar"></div>

    <!-- VIDEO (clean) -->
    <div class="canvas-wrap" id="canvas-wrap">
      <video id="vid" playsinline webkit-playsinline preload="auto" muted></video>
      <canvas id="draw-canvas"></canvas>
    </div>

    <!-- INFO BAR -->
    <div class="info-bar">
      <div>
        <span class="time-display" id="time-display">--:--.--</span>
        <span class="frame-display">F<b id="frame-num">--</b></span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="speed-display" style="font-size:12px;font-weight:700;color:#3a4a5a">1.00x</span>
        <span class="mode-display mode-play" id="mode-display">▶ PLAY</span>
      </div>
    </div>

    <!-- MOTION GRAPH (directly below video) -->
    <div class="graph-box">
      <div id="scan-progress"></div>
      <div class="graph-header">
        <span class="graph-title">Motion / Speed Profile</span>
        <div class="graph-controls">
          <span id="scan-status" style="font-size:10px;color:#3a4a5a"></span>
          <button class="scan-btn" id="scan-btn" onclick="scanVideo()">🔍 Scan Video</button>
        </div>
      </div>
      <canvas id="graph-canvas"></canvas>
      <div class="graph-info">
        <span>← Tap graph to seek →</span>
        <span id="stroke-count" style="color:#ffd740"></span>
        <span id="graph-hover" style="color:#00e5ff"></span>
      </div>
    </div>

    <!-- TRANSPORT -->
    <div class="frame-row">
      <button class="btn" onclick="step(-1)">◀ 1 Frame</button>
      <button class="btn" onclick="nudge(-0.5)">-0.5s</button>
      <button class="btn btn-play" id="play-btn" onclick="toggle()">▶ PLAY</button>
      <button class="btn" onclick="nudge(0.5)">+0.5s</button>
      <button class="btn" onclick="step(1)">1 Frame ▶</button>
    </div>
    <div class="frame10-row">
      <button class="btn" onclick="step(-10)">⏪ 10 Frames</button>
      <button class="btn" id="play-btn2" onclick="toggle()" style="background:transparent;border:1px dashed rgba(255,255,255,.08);color:#3a4a5a;font-size:11px">Pause to draw</button>
      <button class="btn" onclick="step(10)">10 Frames ⏩</button>
    </div>
    <div class="speed-row">
      <span class="speed-label">SPEED</span>
      <button class="btn btn-sm" id="spd-01" onclick="setSpd(0.1)">0.1x</button>
      <button class="btn btn-sm" id="spd-025" onclick="setSpd(0.25)">0.25x</button>
      <button class="btn btn-sm" id="spd-05" onclick="setSpd(0.5)">0.5x</button>
      <button class="btn btn-sm btn-on" id="spd-1" onclick="setSpd(1)">1x</button>
      <button class="btn btn-sm" id="spd-2" onclick="setSpd(2)">2x</button>
      <button class="btn btn-sm" id="spd-4" onclick="setSpd(4)">4x</button>
      <button class="btn btn-sm" id="spd-10" onclick="setSpd(10)">10x</button>
    </div>

    <!-- DRAWING -->
    <div class="draw-bar">
      <div class="draw-row" style="margin-bottom:10px">
        <span class="draw-label">DRAW</span>
        <button class="btn tool-btn" id="tool-draw" onclick="setTool('draw')" style="background:rgba(255,215,64,.12);border:1px solid #ffd740;color:#ffd740">✏️ Draw</button>
        <button class="btn tool-btn" id="tool-erase" onclick="setTool('erase')" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#7a8a9a">🧹 Erase</button>
        <div class="divider"></div>
        <button class="btn tool-btn" onclick="undoDraw()" style="color:#80d8ff">↩ Undo</button>
        <button class="btn tool-btn" onclick="clearDraw()" style="color:#ff5252">🗑 Clear</button>
        <div class="divider"></div>
        <button class="save-btn" onclick="saveFrame()">📸 Save Frame</button>
      </div>
      <div class="draw-row">
        <span class="draw-label">COLOR</span>
        <div class="swatch on" id="sw-red" onclick="setColor('#ff3333')" style="background:#ff3333"></div>
        <div class="swatch" id="sw-black" onclick="setColor('#000000')" style="background:#000;border:2px solid rgba(255,255,255,.15)"></div>
        <div class="swatch" id="sw-white" onclick="setColor('#ffffff')" style="background:#fff"></div>
        <div class="divider"></div>
        <span class="draw-label">SIZE</span>
        <input type="range" class="width-slider" min="2" max="20" value="4" oninput="setWidth(this.value)">
        <span id="width-val" style="font-size:12px;color:#5a7a8a;min-width:28px">4px</span>
      </div>
    </div>

    <div class="tip">
      <strong style="color:#3a4a5a">How:</strong> Load video → tap <strong style="color:#00e5ff">Scan Video</strong> to auto-detect motion → graph shows stroke rhythm and speed. Tap anywhere on the graph to jump to that moment. Pause and draw to annotate.
    </div>
  </div>
</div>

<!-- Hidden canvas for motion detection -->
<canvas id="sample-canvas" style="display:none"></canvas>

<script>
const POOL=17, Y2M=0.9144;
let fps=30, rate=1, playing=false, videoReady=false;
let tool='draw', drawColor='#ff3333', lineWidth=4;
let isDrawing=false, drawStrokes=[], currentStroke=[];

// Motion data
let motionData=[], scanning=false, scanned=false;
let detectedStrokes=[];

const V=document.getElementById('vid');
const CW=document.getElementById('canvas-wrap');
const canvas=document.getElementById('draw-canvas');
const ctx=canvas.getContext('2d');
const graphCanvas=document.getElementById('graph-canvas');
const gctx=graphCanvas.getContext('2d');
const sampleCanvas=document.getElementById('sample-canvas');
const sctx=sampleCanvas.getContext('2d',{willReadFrequently:true});

function fmT(s){if(isNaN(s))return'--:--.--';return Math.floor(s/60)+':'+(s%60).toFixed(2).padStart(5,'0')}
function fn(s){return Math.round(s*fps)}
function showStatus(m,t){const e=document.getElementById('status-bar');e.textContent=m;e.className=t}

function updateMode(){
  const md=document.getElementById('mode-display'),pb2=document.getElementById('play-btn2');
  if(playing){CW.classList.remove('drawing');md.className='mode-display mode-play';md.textContent='▶ PLAY';pb2.textContent='Pause to draw'}
  else if(tool==='erase'){CW.classList.add('drawing');md.className='mode-display mode-erase';md.textContent='🧹 ERASE';pb2.textContent='⏸ PAUSED'}
  else{CW.classList.add('drawing');md.className='mode-display mode-draw';md.textContent='✏️ DRAW';pb2.textContent='⏸ PAUSED'}
}

// File loading
document.getElementById('file-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  showStatus('Loading '+f.name+'...','loading');
  document.getElementById('upload-zone').style.display='none';
  document.getElementById('player-area').style.display='block';
  V.src=URL.createObjectURL(f);V.load();
  videoReady=false;drawStrokes=[];currentStroke=[];motionData=[];scanned=false;detectedStrokes=[];
  drawGraph();
});

// Video events
V.addEventListener('loadedmetadata',function(){showStatus(V.videoWidth+'×'+V.videoHeight+' · '+V.duration.toFixed(1)+'s','loading');resizeCanvas()});
V.addEventListener('loadeddata',function(){videoReady=true;updateHUD();showStatus('Ready — Play or Scan Video','ready')});
V.addEventListener('canplay',function(){videoReady=true;resizeCanvas();showStatus('Ready','ready')});
V.addEventListener('error',function(){const err=V.error;let m='Error: ';if(err){switch(err.code){case 3:m+='Decode error';break;case 4:m+='Format not supported';break;default:m+='Code '+err.code}}showStatus(m,'error')});
V.addEventListener('play',function(){playing=true;document.getElementById('play-btn').className='btn btn-pause';document.getElementById('play-btn').innerHTML='⏸ PAUSE';updateMode();if(V.requestVideoFrameCallback)V.requestVideoFrameCallback(onVF)});
V.addEventListener('pause',function(){playing=false;document.getElementById('play-btn').className='btn btn-play';document.getElementById('play-btn').innerHTML='▶ PLAY';updateMode()});
V.addEventListener('ended',function(){playing=false;document.getElementById('play-btn').className='btn btn-play';document.getElementById('play-btn').innerHTML='▶ PLAY';updateMode()});
V.addEventListener('click',function(){if(videoReady&&!scanning)toggle()});

// Canvas sizing
function resizeCanvas(){const r=V.getBoundingClientRect(),dpr=window.devicePixelRatio||1;canvas.width=r.width*dpr;canvas.height=r.height*dpr;canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';ctx.setTransform(dpr,0,0,dpr,0,0);redrawAll()}
window.addEventListener('resize',function(){if(V.src){resizeCanvas();drawGraph()}});

// FPS detection
let fpsSamples=[];
function onVF(now,meta){
  updateHUD();if(scanned)drawGraph();
  fpsSamples.push(meta.mediaTime);
  if(fpsSamples.length>20){const d=[];for(let i=1;i<fpsSamples.length;i++){const x=fpsSamples[i]-fpsSamples[i-1];if(x>.001&&x<.2)d.push(x)}
  if(d.length>10){const avg=d.reduce((a,b)=>a+b,0)/d.length,det=Math.round(1/avg);if(det>10&&det<240)fps=det}fpsSamples=fpsSamples.slice(-10)}
  if(!V.paused&&V.requestVideoFrameCallback)V.requestVideoFrameCallback(onVF);
}
setInterval(function(){if(V.src&&V.readyState>0){updateHUD();if(scanned&&!scanning)drawGraph()}},100);

function updateHUD(){
  document.getElementById('time-display').textContent=fmT(V.currentTime);
  document.getElementById('frame-num').textContent=fn(V.currentTime);
  const sd=document.getElementById('speed-display');sd.textContent=rate.toFixed(2)+'x';sd.style.color=rate===1?'#3a4a5a':'#ffd740';
}

// Controls
function toggle(){if(!scanning){playing?V.pause():V.play()}}
function step(n){V.pause();V.currentTime=Math.max(0,Math.min(V.duration,V.currentTime+n/fps));updateHUD();if(scanned)drawGraph()}
function nudge(s){V.currentTime=Math.max(0,Math.min(V.duration,V.currentTime+s));updateHUD();if(scanned)drawGraph()}
const speeds=[0.1,0.25,0.5,1,2,4,10];
function setSpd(r){rate=r;V.playbackRate=r;updateHUD();speeds.forEach(function(s){const id='spd-'+String(s).replace('.',''),el=document.getElementById(id);if(el)el.className='btn btn-sm'+(Math.abs(rate-s)<.01?' btn-on':'')})}

// ===== MOTION DETECTION =====
async function scanVideo(){
  if(scanning||!videoReady)return;
  scanning=true;scanned=false;motionData=[];detectedStrokes=[];

  const btn=document.getElementById('scan-btn');
  btn.className='scan-btn scanning';btn.textContent='Scanning...';btn.disabled=true;
  document.getElementById('scan-status').textContent='';

  const wasPlaying=playing;
  V.pause();

  // Sample at ~10 fps for efficiency
  const sampleFps=10;
  const totalSamples=Math.floor(V.duration*sampleFps);
  const sw=160,sh=90; // Small sample size
  sampleCanvas.width=sw;sampleCanvas.height=sh;

  let prevPixels=null;
  const progress=document.getElementById('scan-progress');

  for(let i=0;i<=totalSamples;i++){
    const t=i/sampleFps;
    V.currentTime=t;

    // Wait for seek to complete
    await new Promise(function(resolve){
      const onSeeked=function(){V.removeEventListener('seeked',onSeeked);resolve()};
      V.addEventListener('seeked',onSeeked);
      // Timeout fallback
      setTimeout(resolve,200);
    });

    // Draw frame to sample canvas
    sctx.drawImage(V,0,0,sw,sh);
    const imageData=sctx.getImageData(0,0,sw,sh);
    const pixels=imageData.data;

    if(prevPixels){
      let diff=0, count=0;
      // Compare grayscale values
      for(let p=0;p<pixels.length;p+=4){
        const gray1=(pixels[p]+pixels[p+1]+pixels[p+2])/3;
        const gray2=(prevPixels[p]+prevPixels[p+1]+prevPixels[p+2])/3;
        const d=Math.abs(gray1-gray2);
        if(d>15) diff+=d; // Threshold to ignore noise
        count++;
      }
      const motion=diff/count; // Normalized motion intensity
      motionData.push({time:t,motion:motion});
    }

    prevPixels=new Uint8ClampedArray(pixels);
    progress.style.width=(i/totalSamples*100)+'%';
    document.getElementById('scan-status').textContent=Math.round(i/totalSamples*100)+'%';

    // Yield to UI
    if(i%5===0) await new Promise(r=>setTimeout(r,0));
  }

  // Detect stroke peaks
  detectStrokes();

  scanning=false;scanned=true;
  btn.className='scan-btn';btn.textContent='🔍 Rescan';btn.disabled=false;
  progress.style.width='0%';
  document.getElementById('scan-status').textContent='Done';

  // Show stroke count
  document.getElementById('stroke-count').textContent=detectedStrokes.length+' strokes detected';

  V.currentTime=0;updateHUD();
  drawGraph();
}

function detectStrokes(){
  if(motionData.length<5) return;

  // Smooth the motion data
  const smoothed=[];
  const w=3; // Window
  for(let i=0;i<motionData.length;i++){
    let sum=0,cnt=0;
    for(let j=Math.max(0,i-w);j<=Math.min(motionData.length-1,i+w);j++){sum+=motionData[j].motion;cnt++}
    smoothed.push(sum/cnt);
  }

  // Find peaks
  const avg=smoothed.reduce((a,b)=>a+b,0)/smoothed.length;
  const threshold=avg*1.3;
  let inPeak=false, peakMax=0, peakTime=0;

  for(let i=1;i<smoothed.length-1;i++){
    if(smoothed[i]>threshold){
      if(!inPeak){inPeak=true;peakMax=0}
      if(smoothed[i]>peakMax){peakMax=smoothed[i];peakTime=motionData[i].time}
    } else {
      if(inPeak){
        // Check minimum distance from last detected stroke (0.6s)
        if(detectedStrokes.length===0||peakTime-detectedStrokes[detectedStrokes.length-1].time>0.6){
          detectedStrokes.push({time:peakTime,intensity:peakMax});
        }
        inPeak=false;
      }
    }
  }
}

// ===== GRAPH DRAWING =====
function drawGraph(){
  const rect=graphCanvas.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  graphCanvas.width=rect.width*dpr;
  graphCanvas.height=120*dpr;
  graphCanvas.style.height='120px';
  gctx.setTransform(dpr,0,0,dpr,0,0);

  const W=rect.width,H=120;
  const pad={t:8,r:12,b:22,l:40};
  const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;

  gctx.clearRect(0,0,W,H);

  if(!scanned||motionData.length<2){
    gctx.fillStyle='#2a3a4a';gctx.font='12px IBM Plex Mono';gctx.textAlign='center';
    gctx.fillText('Tap "Scan Video" to analyze motion',W/2,H/2);
    return;
  }

  const maxMotion=Math.max(...motionData.map(d=>d.motion))*1.1;
  const dur=V.duration||motionData[motionData.length-1].time;

  function sx(t){return pad.l+(t/dur)*gW}
  function sy(m){return pad.t+gH-(m/maxMotion)*gH}

  // Grid
  gctx.strokeStyle='rgba(255,255,255,.03)';gctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.t+gH*i/4;gctx.beginPath();gctx.moveTo(pad.l,y);gctx.lineTo(W-pad.r,y);gctx.stroke()}

  // Y-axis
  gctx.fillStyle='#3a4a5a';gctx.font='9px IBM Plex Mono';gctx.textAlign='right';
  gctx.fillText('High',pad.l-4,pad.t+8);
  gctx.fillText('Low',pad.l-4,pad.t+gH);

  // X-axis time labels
  gctx.textAlign='center';
  const xSteps=Math.min(8,Math.floor(dur));
  for(let i=0;i<=xSteps;i++){
    const t=dur*i/xSteps;
    gctx.fillText(t.toFixed(1)+'s',sx(t),H-pad.b+14);
  }

  // Fill area
  gctx.globalAlpha=0.12;gctx.fillStyle='#00e5ff';
  gctx.beginPath();gctx.moveTo(sx(motionData[0].time),sy(0));
  motionData.forEach(d=>gctx.lineTo(sx(d.time),sy(d.motion)));
  gctx.lineTo(sx(motionData[motionData.length-1].time),sy(0));gctx.closePath();gctx.fill();
  gctx.globalAlpha=1;

  // Motion line
  gctx.strokeStyle='rgba(0,229,255,.5)';gctx.lineWidth=1.5;gctx.lineJoin='round';
  gctx.beginPath();
  motionData.forEach(function(d,i){const x=sx(d.time),y=sy(d.motion);i===0?gctx.moveTo(x,y):gctx.lineTo(x,y)});
  gctx.stroke();

  // Detected stroke markers
  detectedStrokes.forEach(function(s,i){
    const x=sx(s.time);
    // Vertical line
    gctx.strokeStyle='rgba(255,215,64,.3)';gctx.lineWidth=1;
    gctx.beginPath();gctx.moveTo(x,pad.t);gctx.lineTo(x,pad.t+gH);gctx.stroke();
    // Dot
    gctx.beginPath();gctx.arc(x,pad.t+4,3,0,Math.PI*2);
    gctx.fillStyle='#ffd740';gctx.fill();
    // Number
    if(gW/detectedStrokes.length>15){
      gctx.fillStyle='#ffd740';gctx.font='bold 8px IBM Plex Mono';gctx.textAlign='center';
      gctx.fillText(i+1,x,pad.t+gH+10);
    }
  });

  // Playback cursor (red vertical line)
  const cx=sx(V.currentTime);
  gctx.strokeStyle='#ff3333';gctx.lineWidth=2;
  gctx.beginPath();gctx.moveTo(cx,pad.t);gctx.lineTo(cx,pad.t+gH);gctx.stroke();
  // Cursor triangle
  gctx.fillStyle='#ff3333';gctx.beginPath();gctx.moveTo(cx-5,pad.t);gctx.lineTo(cx+5,pad.t);gctx.lineTo(cx,pad.t+6);gctx.closePath();gctx.fill();
}

// Tap graph to seek
graphCanvas.addEventListener('click',function(e){
  if(!scanned||!videoReady)return;
  const rect=graphCanvas.getBoundingClientRect();
  const pad={l:40,r:12};
  const x=e.clientX-rect.left;
  const gW=rect.width-pad.l-pad.r;
  const pct=(x-pad.l)/gW;
  if(pct<0||pct>1)return;
  const t=pct*(V.duration||1);
  V.currentTime=t;
  V.pause();
  updateHUD();drawGraph();
});

// Show time on hover/touch
graphCanvas.addEventListener('mousemove',function(e){
  if(!scanned)return;
  const rect=graphCanvas.getBoundingClientRect();
  const pad={l:40,r:12};
  const pct=(e.clientX-rect.left-pad.l)/(rect.width-pad.l-pad.r);
  if(pct<0||pct>1){document.getElementById('graph-hover').textContent='';return}
  document.getElementById('graph-hover').textContent=fmT(pct*(V.duration||1));
});

// ===== DRAWING =====
function setTool(t){
  tool=t;
  document.getElementById('tool-draw').style.background=t==='draw'?'rgba(255,215,64,.12)':'rgba(255,255,255,.04)';
  document.getElementById('tool-draw').style.borderColor=t==='draw'?'#ffd740':'rgba(255,255,255,.08)';
  document.getElementById('tool-draw').style.color=t==='draw'?'#ffd740':'#7a8a9a';
  document.getElementById('tool-erase').style.background=t==='erase'?'rgba(255,82,82,.12)':'rgba(255,255,255,.04)';
  document.getElementById('tool-erase').style.borderColor=t==='erase'?'#ff5252':'rgba(255,255,255,.08)';
  document.getElementById('tool-erase').style.color=t==='erase'?'#ff5252':'#7a8a9a';
  updateMode();
}
function setColor(c){drawColor=c;document.querySelectorAll('.swatch').forEach(el=>el.classList.remove('on'));
  if(c==='#ff3333')document.getElementById('sw-red').classList.add('on');
  else if(c==='#000000')document.getElementById('sw-black').classList.add('on');
  else document.getElementById('sw-white').classList.add('on');
  if(tool==='erase')setTool('draw');
}
function setWidth(v){lineWidth=parseInt(v);document.getElementById('width-val').textContent=lineWidth+'px'}

function getPos(e){const r=canvas.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top}}
function startDraw(e){if(playing||scanning)return;e.preventDefault();isDrawing=true;const p=getPos(e);currentStroke=[{x:p.x,y:p.y,color:tool==='erase'?'erase':drawColor,width:tool==='erase'?lineWidth*4:lineWidth,tool:tool}]}
function moveDraw(e){
  if(!isDrawing||playing)return;e.preventDefault();const p=getPos(e),prev=currentStroke[currentStroke.length-1];
  if(tool==='erase'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=lineWidth*4}
  else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=drawColor;ctx.lineWidth=lineWidth}
  ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(prev.x,prev.y);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.globalCompositeOperation='source-over';
  currentStroke.push({x:p.x,y:p.y,color:tool==='erase'?'erase':drawColor,width:tool==='erase'?lineWidth*4:lineWidth,tool:tool});
}
function endDraw(e){if(!isDrawing)return;e.preventDefault();isDrawing=false;if(currentStroke.length>1)drawStrokes.push(currentStroke.slice());currentStroke=[]}

canvas.addEventListener('touchstart',startDraw,{passive:false});
canvas.addEventListener('touchmove',moveDraw,{passive:false});
canvas.addEventListener('touchend',endDraw,{passive:false});
canvas.addEventListener('touchcancel',endDraw,{passive:false});
canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('mousemove',moveDraw);
canvas.addEventListener('mouseup',endDraw);
canvas.addEventListener('mouseleave',endDraw);

function redrawAll(){ctx.clearRect(0,0,canvas.width,canvas.height);drawStrokes.forEach(function(stroke){if(stroke.length<2)return;for(let i=1;i<stroke.length;i++){const prev=stroke[i-1],pt=stroke[i];if(pt.tool==='erase'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)'}else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=pt.color}ctx.lineWidth=pt.width;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(prev.x,prev.y);ctx.lineTo(pt.x,pt.y);ctx.stroke()}});ctx.globalCompositeOperation='source-over'}
function undoDraw(){if(drawStrokes.length){drawStrokes.pop();resizeCanvas()}}
function clearDraw(){drawStrokes=[];ctx.clearRect(0,0,canvas.width,canvas.height)}

function saveFrame(){
  const r=V.getBoundingClientRect(),sc=document.createElement('canvas');
  sc.width=V.videoWidth;sc.height=V.videoHeight;const sctx2=sc.getContext('2d');
  sctx2.drawImage(V,0,0,V.videoWidth,V.videoHeight);
  const sx2=V.videoWidth/r.width,sy2=V.videoHeight/r.height;
  drawStrokes.forEach(function(stroke){if(stroke.length<2)return;for(let i=1;i<stroke.length;i++){const prev=stroke[i-1],pt=stroke[i];if(pt.tool==='erase')continue;sctx2.strokeStyle=pt.color;sctx2.lineWidth=pt.width*sx2;sctx2.lineCap='round';sctx2.lineJoin='round';sctx2.beginPath();sctx2.moveTo(prev.x*sx2,prev.y*sy2);sctx2.lineTo(pt.x*sx2,pt.y*sy2);sctx2.stroke()}});
  const link=document.createElement('a');link.download='swim-frame-'+fn(V.currentTime)+'.png';link.href=sc.toDataURL('image/png');link.click();
}

// Keyboard
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  switch(e.key){case' ':e.preventDefault();toggle();break;case'ArrowRight':e.preventDefault();step(e.shiftKey?10:1);break;case'ArrowLeft':e.preventDefault();step(e.shiftKey?-10:-1);break;case'd':case'D':setTool('draw');break;case'e':case'E':setTool('erase');break;case'z':case'Z':if(e.metaKey||e.ctrlKey)undoDraw();break}
});
</script>
